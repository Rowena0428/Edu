<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowena PDF 知識庫批次上傳工具 (解碼完全體)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>
<body class="bg-slate-50 text-slate-800 p-8 font-sans">
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
        <h1 class="text-3xl font-bold mb-2 text-blue-900">📚 Rowena PDF 知識庫批次上傳器</h1>
        <p class="text-slate-500 mb-8">選擇多個 PDF 檔案，系統會自動在瀏覽器內解析文字、進行語意向量化並安全寫入 Supabase。</p>

        <div class="space-y-6">
            <div class="grid grid-cols-4 gap-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Gemini API Key</label>
                    <input type="password" id="apiKey" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">哪個科目？</label>
                    <select id="subject" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="chinese">中文科 (Chinese)</option>
                        <option value="english">英文科 (English)</option>
                        <option value="math_ch">數學科 (中文版)</option>
                        <option value="math_en">數學科 (英文版)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">哪卷/哪部分？</label>
                    <select id="paper" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="1">卷一 (Paper 1)</option>
                        <option value="2">卷二 (Paper 2)</option>
                        <option value="all">全卷通用 / 不分卷</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">檔案類型？</label>
                    <select id="docType" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="passages">閱讀材料 / 文本 (Passages)</option>
                        <option value="qa_book">答題簿 / 學生答案冊 (QA Book)</option>
                        <option value="general">不分 / 其他材料 (General)</option>
                    </select>
                </div>
            </div>

            <div class="border-2 border-dashed border-blue-300 bg-blue-50/50 rounded-xl p-8 text-center">
                <input type="file" id="pdfInput" accept=".pdf" multiple class="hidden">
                <label for="pdfInput" class="cursor-pointer flex flex-col items-center justify-center">
                    <svg class="w-12 h-12 text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="text-blue-700 font-bold text-lg">點擊選擇 PDF 檔案</span>
                    <span class="text-slate-500 text-sm mt-1">（可一次選取多個檔案）</span>
                </label>
                <div id="fileList" class="mt-4 text-sm text-slate-600 text-left hidden"></div>
            </div>

            <button id="processBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-md disabled:bg-slate-400 disabled:cursor-not-allowed">
                🚀 開始全自動解析與上傳
            </button>

            <div id="statusBox" class="p-4 bg-slate-900 text-green-400 rounded-xl text-sm whitespace-pre-wrap font-mono h-64 overflow-y-auto hidden shadow-inner"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = '';
        const SUPABASE_ANON_KEY = '';
        const EMBEDDING_MODEL = 'embedding-001'; 

        const pdfInput = document.getElementById('pdfInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const statusBox = document.getElementById('statusBox');

        pdfInput.addEventListener('change', () => {
            if (pdfInput.files.length > 0) {
                fileList.classList.remove('hidden');
                fileList.innerHTML = `<p class="font-bold mb-2">已選擇 ${pdfInput.files.length} 個檔案：</p>` + 
                    Array.from(pdfInput.files).map(f => `📄 ${f.name}`).join('<br>');
            } else {
                fileList.classList.add('hidden');
            }
        });

        function logStatus(msg) {
            statusBox.classList.remove('hidden');
            statusBox.textContent += msg + '\n';
            statusBox.scrollTop = statusBox.scrollHeight;
        }

        // 💡 核心修復：加入中文解碼數據庫 (CMaps)
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ 
                data: arrayBuffer,
                // 強制加載官方亞洲字體映射表
                cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
                cMapPacked: true
            }).promise;
            
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + '\n\n';
            }
            return fullText;
        }

        function chunkText(text, maxLength = 800) {
            const paragraphs = text.split('\n').filter(p => p.trim().length > 5);
            const chunks = [];
            let currentChunk = '';
            for (const p of paragraphs) {
                if ((currentChunk.length + p.length) > maxLength && currentChunk.length > 0) {
                    chunks.push(currentChunk.trim());
                    currentChunk = '';
                }
                currentChunk += p + '\n';
            }
            if (currentChunk.trim().length > 0) chunks.push(currentChunk.trim());
            return chunks;
        }

        async function getEmbedding(text, apiKey) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${EMBEDDING_MODEL}:embedContent?key=${apiKey}`;
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: `models/${EMBEDDING_MODEL}`, content: { parts: [{ text }] } })
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            return data.embedding.values;
        }

        async function insertToSupabase(content, embedding, subject, paper, docType, fileName) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/documents`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    content: content,
                    embedding: embedding,
                    metadata: { 
                        subject: subject, 
                        paper: paper, 
                        doc_type: docType, 
                        source_file: fileName, 
                        upload_type: 'pdf_batch' 
                    }
                })
            });
            if (!response.ok) throw new Error(await response.text());
        }

        processBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const subject = document.getElementById('subject').value;
            const paper = document.getElementById('paper').value;
            const docType = document.getElementById('docType').value;
            const files = pdfInput.files;

            if (!apiKey) return alert('請輸入 Gemini API Key！');
            if (files.length === 0) return alert('請至少選擇一個 PDF 檔案！');

            statusBox.textContent = '';
            processBtn.disabled = true;

            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    logStatus(`\n[${i+1}/${files.length}] 正在讀取 PDF: ${file.name} ...`);
                    
                    const text = await extractTextFromPDF(file);
                    
                    // 【安全防禦機制】：若字數仍舊太少，觸發中斷報警
                    if (text.trim().length < 50) {
                        throw new Error(`檔案 "${file.name}" 提取到的字數極少 (${text.trim().length} 字)。這可能是加密或極特殊的圖片掃描檔，請更換檔案來源。`);
                    }

                    logStatus(`✅ 讀取與中文解碼完成，共提取了 ${text.length} 個字元。正在切塊...`);
                    
                    const chunks = chunkText(text);
                    
                    if (chunks.length === 0) {
                        throw new Error(`檔案 "${file.name}" 切分後的有效區塊為 0！`);
                    }

                    logStatus(`✅ 文本已切分為 ${chunks.length} 個區塊。開始轉向量與上傳...\n[標籤：${subject} / 卷數：${paper} / 類型：${docType}]`);

                    for (let j = 0; j < chunks.length; j++) {
                        logStatus(`  -> 正在上傳區塊 ${j + 1}/${chunks.length}...`);
                        const vector = await getEmbedding(chunks[j], apiKey);
                        await insertToSupabase(chunks[j], vector, subject, paper, docType, file.name);
                        await new Promise(r => setTimeout(r, 800)); 
                    }
                    logStatus(`🎉 檔案 ${file.name} 處理完畢！`);
                }
                logStatus('\n🎊 所有 PDF 檔案皆已成功寫入 Supabase 知識庫！');
            } catch (error) {
                logStatus(`\n❌ 【上傳中斷】原因：${error.message}`);
                alert(`上傳失敗：${error.message}`);
                console.error(error);
            } finally {
                processBtn.disabled = false;
                pdfInput.value = ''; 
                fileList.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
